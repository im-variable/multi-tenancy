apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: multi-tenant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/api-gateway:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: multi-tenant
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
